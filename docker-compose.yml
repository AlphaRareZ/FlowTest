# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  FlowTest – Docker Compose (Production)                                    ║
# ║                                                                            ║
# ║  Usage:                                                                    ║
# ║    1. Copy .env.example → .env and fill in your values                     ║
# ║    2. docker compose up -d --build                                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: flowtest
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend API ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/flowtest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MAX_CONCURRENT_USERS: ${MAX_CONCURRENT_USERS:-1000}
      HTTP_REQUEST_TIMEOUT_MS: ${HTTP_REQUEST_TIMEOUT_MS:-10000}
      MAX_RETRIES: ${MAX_RETRIES:-2}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - internal

# ── Volumes ────────────────────────────────────────────────────────────────────

volumes:
  mongo_data:
  redis_data:

# ── Networks ───────────────────────────────────────────────────────────────────

networks:
  internal:
    driver: bridge
